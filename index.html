    };
    var fbDb = null, useFB = false;
    try {
      if (FIREBASE_CONFIG.apiKey !== "SUA_API_KEY") {
        firebase.initializeApp(FIREBASE_CONFIG);
        fbDb = firebase.database();
        useFB = true;
        console.log("Firebase Multiplayer ATIVO!");
      } else {
        console.log("Modo localStorage");
      }
    } catch (e) { console.log("Fallback:", e.message); }

    window.storage = {
      get: function(key, shared) {
        if (useFB) {
          var k = key.replace(/[:.]/g, "_");
          return fbDb.ref("rooms/" + k).once("value").then(function(snap) {
            var v = snap.val();
            if (v == null) throw new Error("not found");
            return { key: key, value: typeof v === "string" ? v : JSON.stringify(v) };
          });
        }
        return new Promise(function(resolve, reject) {
          var v = localStorage.getItem("fm_" + key);
          if (v == null) return reject(new Error("not found"));
          resolve({ key: key, value: v });
        });
      },
      set: function(key, value, shared) {
        if (useFB) {
          var k = key.replace(/[:.]/g, "_");
          return fbDb.ref("rooms/" + k).set(value).then(function() {
            return { key: key, value: value };
          });
        }
        return new Promise(function(resolve) {
          localStorage.setItem("fm_" + key, value);
          resolve({ key: key, value: value });
        });
      },
      list: function(prefix, shared) {
        if (useFB) {
          return fbDb.ref("rooms").once("value").then(function(snap) {
            var p = prefix.replace(/[:.]/g, "_");
            var keys = [];
            snap.forEach(function(c) {
              if (c.key.indexOf(p) === 0) keys.push(prefix + c.key.slice(p.length));
            });
            return { keys: keys };
          });
        }
        return new Promise(function(resolve) {
          var keys = [];
          var lsPrefix = "fm_" + prefix;
          for (var i = 0; i < localStorage.length; i++) {
            var k = localStorage.key(i);
            if (k.indexOf(lsPrefix) === 0) keys.push(prefix + k.slice(lsPrefix.length));
          }
          resolve({ keys: keys });
        });
      }
    };

// STORAGE
// ═══════════════════════════════════════════════════
async function getRoom(rid) {
  try {
    const r = await window.storage.get(`fm2:${rid}`, true);
    return r ? JSON.parse(r.value) : null;
  } catch {
    return null;
  }
}
async function setRoom(rid, data) {
  try {
    data.updatedAt = Date.now();
    await window.storage.set(`fm2:${rid}`, JSON.stringify(data), true);
  } catch (e) {
    console.error(e);
  }
}
async function listRooms() {
  try {
    const res = await window.storage.list("fm2:", true);
    if (!res?.keys?.length) return [];
    const rooms = [];
    for (const k of res.keys.slice(0, 20)) {
      try {
        const r = await window.storage.get(k, true);
        if (r) rooms.push(JSON.parse(r.value));
      } catch {}
    }
    return rooms.filter(r => r && Date.now() - r.updatedAt < 3600000);
  } catch {
    return [];
  }
}

// STYLES

const css = `
@import url('https://fonts.googleapis.com/css2?family=Bubblegum+Sans&family=Quicksand:wght@400;500;600;700&display=swap');
:root{--pink:#FF7EB3;--mint:#4ECDC4;--yellow:#FFD93D;--lav:#C3AED6;--cream:#FFF8F0;--coral:#FF8A80;--td:#3D2C2E;--tm:#7A6568;--sh:0 8px 30px rgba(0,0,0,0.08);--r:24px;}
*{box-sizing:border-box;margin:0;padding:0;}
body,#root{font-family:'Quicksand',sans-serif;background:var(--cream);color:var(--td);min-height:100vh;overflow-x:hidden;}
.app{min-height:100vh;background:radial-gradient(ellipse at 30% 20%,rgba(255,126,179,0.08) 0%,transparent 60%),radial-gradient(ellipse at 70% 80%,rgba(78,205,196,0.08) 0%,transparent 60%),var(--cream);}
.page{min-height:100vh;display:flex;flex-direction:column;align-items:center;padding:20px;position:relative;z-index:1;animation:pageIn .5s ease;}
@keyframes pageIn{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:none}}
@keyframes popIn{from{opacity:0;transform:scale(.6)}to{opacity:1;transform:scale(1)}}
@keyframes bounce{0%,100%{transform:translateY(0)}50%{transform:translateY(-10px)}}
@keyframes wiggle{0%,100%{transform:rotate(0)}25%{transform:rotate(-5deg)}75%{transform:rotate(5deg)}}
@keyframes shimmer{0%{background-position:-200% center}100%{background-position:200% center}}
@keyframes pulse{0%,100%{transform:scale(1);opacity:1}50%{transform:scale(1.2);opacity:.7}}
@keyframes glow{0%,100%{box-shadow:0 0 8px rgba(255,126,179,.3)}50%{box-shadow:0 0 24px rgba(255,126,179,.6)}}
@keyframes slideUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:none}}
@keyframes confettiDrop{0%{transform:translateY(0) rotate(0);opacity:1}100%{transform:translateY(-250px) rotate(720deg);opacity:0}}
@keyframes conveyorMove{0%{background-position:0 0}100%{background-position:40px 0}}
@keyframes floatDeco{0%,100%{transform:translateY(0) rotate(0)}50%{transform:translateY(-18px) rotate(6deg)}}
@keyframes choicePop{from{opacity:0;transform:scale(.7) translateY(10px)}to{opacity:1;transform:scale(1) translateY(0)}}
.svgA{animation:popIn .5s ease both;}
.title-main{font-family:'Bubblegum Sans',cursive;font-size:clamp(2.5rem,8vw,4.5rem);background:linear-gradient(135deg,var(--pink),var(--yellow),var(--mint),var(--lav));background-size:300% 300%;-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;animation:shimmer 5s ease infinite;text-align:center;line-height:1.1;}
.title-sm{font-family:'Bubblegum Sans',cursive;font-size:clamp(1.6rem,5vw,2.5rem);color:var(--td);text-align:center;}
.subtitle{font-size:clamp(.9rem,2.5vw,1.15rem);color:var(--tm);text-align:center;font-weight:600;margin-top:4px;}
.card{background:white;border-radius:var(--r);padding:24px;box-shadow:var(--sh);border:3px solid rgba(255,126,179,.12);width:100%;max-width:520px;position:relative;overflow:hidden;}
.card::before{content:'';position:absolute;top:0;left:0;right:0;height:4px;background:linear-gradient(90deg,var(--pink),var(--yellow),var(--mint));}
.btn{font-family:'Bubblegum Sans',cursive;font-size:1.1rem;padding:13px 32px;border:none;border-radius:50px;cursor:pointer;transition:all .3s cubic-bezier(.175,.885,.32,1.275);display:inline-flex;align-items:center;justify-content:center;gap:8px;box-shadow:0 4px 15px rgba(0,0,0,.1);user-select:none;}
.btn:hover{transform:translateY(-3px) scale(1.03);}
.btn:active{transform:translateY(-1px) scale(.98);}
.btn:disabled{opacity:.5;cursor:not-allowed;transform:none!important;}
.btn-pink{background:linear-gradient(135deg,var(--pink),#FF9EC7);color:white;}
.btn-mint{background:linear-gradient(135deg,var(--mint),#7EDDD6);color:white;}
.btn-yellow{background:linear-gradient(135deg,#FFB347,var(--yellow));color:var(--td);}
.btn-sm{font-size:.9rem;padding:10px 20px;}
.input-field{font-family:'Quicksand',sans-serif;font-size:1.05rem;font-weight:600;padding:14px 20px;border:3px solid rgba(255,126,179,.2);border-radius:50px;background:rgba(255,248,240,.8);color:var(--td);width:100%;outline:none;transition:all .3s;}
.input-field:focus{border-color:var(--pink);box-shadow:0 0 20px rgba(255,126,179,.15);background:white;}
.input-field::placeholder{color:#C8B0B4;}
.label{font-family:'Bubblegum Sans',cursive;font-size:.85rem;color:var(--tm);text-transform:uppercase;letter-spacing:2px;margin-bottom:10px;}
.divider{width:60px;height:5px;border-radius:3px;background:linear-gradient(90deg,var(--pink),var(--mint));margin:8px auto;}
.avatar-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin:16px 0;}
.avatar-card{border:3px solid transparent;border-radius:18px;padding:12px 4px 8px;text-align:center;cursor:pointer;transition:all .3s cubic-bezier(.175,.885,.32,1.275);position:relative;}
.avatar-card:hover{transform:translateY(-3px) scale(1.04);}
.avatar-card.sel{border-color:var(--pink);transform:scale(1.08);animation:glow 2s infinite;}
.av-emoji{font-size:2.2rem;display:block;}.av-badge{position:absolute;top:-4px;right:-4px;font-size:.9rem;}.av-name{font-family:'Bubblegum Sans',cursive;font-size:.75rem;margin-top:3px;display:block;}
.factory-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(190px,1fr));gap:18px;margin:20px 0;width:100%;max-width:520px;}
.factory-card{border-radius:26px;padding:28px 18px 22px;text-align:center;cursor:pointer;transition:all .3s cubic-bezier(.175,.885,.32,1.275);border:4px solid transparent;overflow:hidden;}
.factory-card:hover{transform:translateY(-6px) scale(1.02);box-shadow:0 14px 36px rgba(0,0,0,.12);}
.factory-card.sel{border-color:white;box-shadow:0 12px 40px rgba(255,126,179,.2);transform:scale(1.05);}
.f-icon{font-size:3.5rem;display:block;margin-bottom:10px;animation:bounce 2.5s ease-in-out infinite;}
.f-name{font-family:'Bubblegum Sans',cursive;font-size:1.3rem;color:white;text-shadow:0 2px 4px rgba(0,0,0,.15);}
.f-desc{font-size:.82rem;color:rgba(255,255,255,.85);margin-top:3px;font-weight:600;}
.game-wrap{width:100%;max-width:900px;}
.game-top{display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px;margin-bottom:6px;}
.players-bar{display:flex;gap:8px;flex-wrap:wrap;justify-content:center;margin:6px 0;}
.player-tag{display:flex;align-items:center;gap:5px;background:white;border-radius:50px;padding:5px 12px 5px 7px;font-size:.82rem;font-weight:700;border:2px solid rgba(0,0,0,.06);box-shadow:0 2px 8px rgba(0,0,0,.05);}
.online-dot{width:7px;height:7px;border-radius:50%;background:#2ECC71;animation:pulse 2s infinite;}
.back-btn{background:none;border:none;color:var(--tm);font-family:'Quicksand',sans-serif;font-size:.9rem;font-weight:700;cursor:pointer;display:flex;align-items:center;gap:5px;padding:6px 0;transition:color .2s;}.back-btn:hover{color:var(--pink);}
.step-tracker{display:flex;align-items:center;gap:0;margin:10px 0;width:100%;overflow-x:auto;padding:4px 0;}
.step-dot{width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:1.05rem;font-weight:800;flex-shrink:0;transition:all .3s;border:3px solid transparent;}
.step-dot.done{background:#A8E6CF;border-color:#6BCB9F;color:white;}
.step-dot.active{background:var(--pink);border-color:#FF5A95;color:white;transform:scale(1.2);box-shadow:0 0 15px rgba(255,126,179,.4);}
.step-dot.future{background:#eee;color:#bbb;}
.step-line{flex:1;height:4px;border-radius:2px;min-width:12px;transition:background .3s;}
.step-line.done{background:linear-gradient(90deg,#A8E6CF,var(--mint));}.step-line.future{background:#eee;}
.factory-body{display:grid;grid-template-columns:1fr;gap:14px;margin-top:10px;}
@media(min-width:700px){.factory-body{grid-template-columns:1fr 280px;}}
.choice-panel{background:white;border-radius:var(--r);padding:22px;box-shadow:var(--sh);border:3px solid rgba(255,126,179,.1);}
.choice-title{font-family:'Bubblegum Sans',cursive;font-size:1.4rem;text-align:center;margin-bottom:2px;}
.choice-sub{font-size:.88rem;color:var(--tm);text-align:center;font-weight:600;margin-bottom:14px;}
.color-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(78px,1fr));gap:10px;}
.color-opt{border-radius:16px;padding:12px 6px;text-align:center;cursor:pointer;border:4px solid transparent;transition:all .3s cubic-bezier(.175,.885,.32,1.275);animation:choicePop .4s ease both;background:white;}
.color-opt:hover{transform:translateY(-3px) scale(1.05);}
.color-opt .swatch{width:40px;height:40px;border-radius:50%;margin:0 auto 5px;border:3px solid rgba(0,0,0,.08);box-shadow:inset 0 2px 6px rgba(0,0,0,.1);}
.color-opt .opt-label{font-family:'Bubblegum Sans',cursive;font-size:.78rem;}
.icon-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(88px,1fr));gap:10px;}
.icon-opt{border-radius:18px;padding:14px 6px;text-align:center;cursor:pointer;background:var(--cream);border:3px solid transparent;transition:all .3s cubic-bezier(.175,.885,.32,1.275);animation:choicePop .4s ease both;}
.icon-opt:hover{transform:translateY(-3px) scale(1.05);border-color:rgba(255,126,179,.3);}
.opt-emoji{font-size:1.9rem;display:block;margin-bottom:3px;}.opt-label{font-family:'Bubblegum Sans',cursive;font-size:.76rem;}

.preview-label{font-family:'Bubblegum Sans',cursive;font-size:.82rem;color:var(--tm);text-transform:uppercase;letter-spacing:2px;margin-bottom:6px;}
.preview-bg{border-radius:14px;padding:10px;width:100%;display:flex;justify-content:center;min-height:200px;align-items:center;}
.chat-box{background:white;border-radius:var(--r);border:3px solid rgba(255,126,179,.1);padding:14px;margin-top:12px;box-shadow:var(--sh);}
.chat-msgs{max-height:150px;overflow-y:auto;margin-bottom:10px;display:flex;flex-direction:column;gap:6px;padding-right:4px;}
.chat-msgs::-webkit-scrollbar{width:5px;}.chat-msgs::-webkit-scrollbar-thumb{background:var(--lav);border-radius:3px;}
.chat-msg{display:flex;align-items:flex-start;gap:8px;animation:slideUp .3s ease;}
